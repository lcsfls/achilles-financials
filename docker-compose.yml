# Fester Projektname, damit Updates unabhängig vom Verzeichnisnamen greifen
name: achilles

services:
  achilles:
    build: .
    container_name: achilles-financials
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # WICHTIG: Auf die URL setzen, unter der das Dashboard vom Smartphone
      # erreichbar ist (LAN-IP oder Domain) — wird für den QR-Code-Redirect benutzt.
      - APP_URL=${APP_URL:-http://localhost:3000}
      - REPO_SLUG=${REPO_SLUG:-lcsfls/achilles-financials}
      - REPO_BRANCH=${REPO_BRANCH:-main}
    # Ohne Begrenzung schreibt Docker das Container-Log unbegrenzt in eine
    # einzige json-Datei — auf einem Dashboard, das monatelang durchläuft, ist
    # das ein stiller Dauerfresser. 3 × 10 MB reichen zur Fehlersuche.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - achilles-data:/data
      # Update-Kanal zum Host: die App legt hier eine Anforderung ab, der
      # systemd-Watcher (deploy/achilles-update.path) baut daraufhin neu.
      # Ohne dieses Mount funktioniert alles außer dem In-App-Update.
      - ./control:/control

volumes:
  achilles-data:
